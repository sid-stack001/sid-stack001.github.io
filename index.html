<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SID_OS :: VISION_CORE v2.6</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #020608;
  --bg1:      #050d10;
  --bg2:      #091419;
  --green:    #00ff88;
  --green2:   #00cc6a;
  --dim:      #006633;
  --amber:    #ffb300;
  --red:      #ff3355;
  --blue:     #00aaff;
  --text:     #b0d4c0;
  --muted:    #3a6b50;
  --border:   rgba(0,255,136,0.12);
  --glow:     0 0 12px rgba(0,255,136,0.4);
  --glow-lg:  0 0 40px rgba(0,255,136,0.15);
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}

/* ── CURSOR ── */
#cur { position:fixed; width:10px; height:10px; border-radius:50%; background:var(--green); pointer-events:none; z-index:9999; mix-blend-mode:screen; transition:transform .1s; box-shadow:var(--glow); }
#cur-r { position:fixed; width:28px; height:28px; border:1px solid rgba(0,255,136,.4); border-radius:50%; pointer-events:none; z-index:9998; transition:left .12s ease,top .12s ease; }

/* ── NEURAL CANVAS ── */
#neural { position:fixed; inset:0; z-index:0; opacity:.55; }

/* ── BOOT SCREEN ── */
#boot {
  position:fixed; inset:0; z-index:100;
  background:var(--bg);
  display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
  padding: 4rem 6rem;
  transition: opacity .6s ease;
}
#boot.hide { opacity:0; pointer-events:none; }
#boot-lines { display:flex; flex-direction:column; gap:.35rem; }
.boot-line { font-size:.78rem; color:var(--muted); opacity:0; transform:translateX(-8px); transition:opacity .3s, transform .3s; }
.boot-line.show { opacity:1; transform:none; }
.boot-line.ok::after { content:' [OK]'; color:var(--green); }
.boot-line.warn::after { content:' [WARN]'; color:var(--amber); }
.boot-line span { color:var(--green); }
#boot-bar-wrap { margin-top:1.5rem; width:340px; height:3px; background:var(--bg2); border:1px solid var(--border); opacity:0; transition:opacity .3s; }
#boot-bar-wrap.show { opacity:1; }
#boot-bar { height:100%; width:0%; background:var(--green); box-shadow:var(--glow); transition:width .05s linear; }
#boot-pct { font-size:.65rem; color:var(--green); margin-top:.4rem; opacity:0; }
#boot-pct.show { opacity:1; }

/* ── MAIN OS SHELL ── */
#os {
  position:fixed; inset:0; z-index:10;
  display:grid;
  grid-template-rows: 28px 1fr 24px;
  grid-template-columns: 220px 1fr;
  opacity:0; transition:opacity .8s;
}
#os.show { opacity:1; }

/* ── TOPBAR ── */
#topbar {
  grid-column: 1/-1;
  background: rgba(2,6,8,.95);
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1rem;
  font-size:.6rem; letter-spacing:1.5px;
  backdrop-filter:blur(10px);
}
.tb-left { color:var(--green); display:flex; gap:1.5rem; }
.tb-left span { color:var(--muted); }
.tb-right { color:var(--muted); display:flex; gap:1.5rem; }
.tb-right b { color:var(--amber); }
#clock { color:var(--green); }

/* ── SIDEBAR ── */
#sidebar {
  background: rgba(5,13,16,.9);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden;
  backdrop-filter:blur(8px);
}
#sidebar::-webkit-scrollbar { width:2px; }
#sidebar::-webkit-scrollbar-thumb { background:var(--dim); }

.sb-section { padding:.6rem .8rem .3rem; }
.sb-label { font-size:.5rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:.4rem; }

.cmd-btn {
  display:block; width:100%;
  padding:.4rem .6rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.62rem;
  color:var(--muted);
  background:transparent;
  border:none; border-radius:2px;
  text-align:left;
  cursor:pointer;
  transition:all .15s;
  letter-spacing:.3px;
  position:relative;
}
.cmd-btn::before { content:'$ '; color:var(--dim); transition:color .15s; }
.cmd-btn:hover { color:var(--green); background:rgba(0,255,136,.05); }
.cmd-btn:hover::before { color:var(--green); }
.cmd-btn.active { color:var(--green); background:rgba(0,255,136,.08); border-left:2px solid var(--green); padding-left:calc(.6rem - 2px); }
.cmd-btn.active::before { color:var(--green); }

.sb-divider { height:1px; background:var(--border); margin:.5rem .8rem; }

.sb-info { padding:.5rem .8rem; font-size:.55rem; color:var(--muted); line-height:1.8; }
.sb-info b { color:var(--green); }

/* ── TERMINAL PANE ── */
#terminal {
  background: rgba(2,6,8,.85);
  overflow-y:auto; overflow-x:hidden;
  padding:1.2rem 1.5rem;
  backdrop-filter:blur(6px);
  position:relative;
}
#terminal::-webkit-scrollbar { width:3px; }
#terminal::-webkit-scrollbar-thumb { background:var(--dim); }

.t-line {
  font-size:.72rem;
  line-height:1.7;
  color:var(--text);
  margin-bottom:.05rem;
  white-space:pre-wrap;
  word-break:break-word;
}
.t-line.prompt { color:var(--green); }
.t-line.prompt::before { content:'sid@vision_core:~$ '; }
.t-line.comment { color:var(--muted); font-style:italic; }
.t-line.heading { color:var(--green); font-weight:700; font-size:.8rem; margin:.6rem 0 .2rem; }
.t-line.subheading { color:var(--amber); font-size:.68rem; margin:.4rem 0 .1rem; }
.t-line.success { color:var(--green); }
.t-line.warn { color:var(--amber); }
.t-line.err { color:var(--red); }
.t-line.blank { height:.4rem; }
.t-line.blue { color:var(--blue); }
.t-line b { color:var(--green); font-weight:700; }
.t-line .hi { color:var(--amber); }
.t-line .lo { color:var(--muted); }
.t-line .red { color:var(--red); }
.t-line .bl { color:var(--blue); }

/* typing cursor in terminal */
.t-cursor { display:inline-block; width:7px; height:13px; background:var(--green); vertical-align:middle; animation:blink 1s step-end infinite; }
@keyframes blink { 50%{opacity:0} }

/* art border */
.art-box {
  border:1px solid var(--border);
  padding:.6rem 1rem;
  margin:.4rem 0;
  position:relative;
}
.art-box::before { content:'┌'; position:absolute; top:-1px; left:-1px; color:var(--dim); }
.art-box::after { content:'┘'; position:absolute; bottom:-1px; right:-1px; color:var(--dim); }

/* progress bar inline */
.prog-row { display:flex; align-items:center; gap:.8rem; margin:.15rem 0; }
.prog-label { font-size:.62rem; color:var(--muted); width:120px; flex-shrink:0; }
.prog-bar { flex:1; height:5px; background:rgba(0,255,136,.08); border:1px solid var(--border); position:relative; max-width:200px; }
.prog-fill { height:100%; background:var(--green); box-shadow:var(--glow); transition:width 1s ease; width:0; }
.prog-val { font-size:.58rem; color:var(--green); width:30px; }

/* project card inline */
.proj-inline {
  border-left:2px solid var(--green);
  padding:.5rem .8rem;
  margin:.3rem 0;
  background:rgba(0,255,136,.03);
  transition:background .2s;
}
.proj-inline:hover { background:rgba(0,255,136,.07); }
.proj-inline .p-name { color:var(--green); font-size:.72rem; font-weight:700; }
.proj-inline .p-tag { font-size:.58rem; color:var(--muted); margin-bottom:.3rem; }
.proj-inline .p-desc { font-size:.65rem; color:var(--text); line-height:1.7; }
.proj-inline .p-stack { font-size:.58rem; color:var(--dim); margin-top:.3rem; }

/* status bar */
#statusbar {
  grid-column:1/-1;
  background:var(--green);
  color:var(--bg);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1rem;
  font-size:.55rem; font-weight:700; letter-spacing:1px;
}

/* scanline */
#os::after {
  content:'';
  position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  pointer-events:none; z-index:50;
}

/* mobile fallback nav */
@media(max-width:600px){
  #os { grid-template-columns:1fr; grid-template-rows:28px 160px 1fr 24px; }
  #sidebar { grid-row:2; border-right:none; border-bottom:1px solid var(--border); flex-direction:row; overflow-x:auto; overflow-y:hidden; flex-wrap:nowrap; }
  .sb-section { padding:.4rem; display:flex; gap:.3rem; align-items:center; flex-shrink:0; }
  .sb-label { display:none; }
  .sb-info { display:none; }
  #terminal { grid-row:3; }
  #boot { padding:2rem; }
}
</style>

<script>
/* ═══════════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════════ */
const cur = document.getElementById('cur');
const curR = document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx-5+'px'; cur.style.top=my-5+'px';
});
(function animR(){
  rx+=(mx-rx-14)*.13; ry+=(my-ry-14)*.13;
  curR.style.left=rx+'px'; curR.style.top=ry+'px';
  requestAnimationFrame(animR);
})();
document.querySelectorAll('button,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.transform='scale(2.5)';});
  el.addEventListener('mouseleave',()=>{cur.style.transform='';});
});

/* ═══════════════════════════════════════════════
   NEURAL CANVAS
═══════════════════════════════════════════════ */
(function(){
  const c=document.getElementById('neural');
  const ctx=c.getContext('2d');
  let W,H,nodes=[],mouse={x:0,y:0};
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

  class Node {
    constructor(){
      this.x=Math.random()*W; this.y=Math.random()*H;
      this.vx=(Math.random()-.5)*.3; this.vy=(Math.random()-.5)*.3;
      this.r=Math.random()*1.5+.5;
    }
    update(){
      this.x+=this.vx; this.y+=this.vy;
      if(this.x<0||this.x>W) this.vx*=-1;
      if(this.y<0||this.y>H) this.vy*=-1;
    }
  }

  for(let i=0;i<90;i++) nodes.push(new Node());

  function draw(){
    ctx.clearRect(0,0,W,H);
    // mouse repulsion + draw nodes
    nodes.forEach(n=>{
      n.update();
      const dx=mouse.x-n.x, dy=mouse.y-n.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ n.vx-=dx/d*.04; n.vy-=dy/d*.04; }
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,136,.7)';
      ctx.fill();
    });
    // edges
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){
          ctx.beginPath();
          ctx.moveTo(nodes[i].x,nodes[i].y);
          ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle=`rgba(0,255,136,${(1-d/130)*.18})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

async function runBoot(){
  const wrap = document.getElementById('boot-lines');
  const bar = document.getElementById('boot-bar');
  const pct = document.getElementById('boot-pct');
  const barWrap = document.getElementById('boot-bar-wrap');
  barWrap.classList.add('show');
  pct.classList.add('show');

  for(let i=0;i<bootLines.length;i++){
    const div=document.createElement('div');
    div.className='boot-line '+(bootLines[i].cls||'');
    div.textContent=bootLines[i].t;
    wrap.appendChild(div);
    await sleep(20);
    div.classList.add('show');
    const p=Math.round(((i+1)/bootLines.length)*100);
    bar.style.width=p+'%';
    pct.textContent=p+'%';
    await sleep(i===bootLines.length-1?400:120);
  }
  await sleep(500);
  document.getElementById('boot').classList.add('hide');
  document.getElementById('os').classList.add('show');
  await sleep(800);
  runCommand('whoami', true);
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
const term = document.getElementById('terminal');
let typing = false;

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function addLine(text='', cls='', delay=0){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const d=document.createElement('div');
      d.className='t-line '+(cls||'');
      d.innerHTML=text;
      term.appendChild(d);
      term.scrollTop=term.scrollHeight;
      resolve(d);
    },delay);
  });
}

async function typeText(text, cls='', speed=18){
  const d=document.createElement('div');
  d.className='t-line '+(cls||'');
  term.appendChild(d);
  for(let i=0;i<=text.length;i++){
    d.textContent=text.slice(0,i);
    term.scrollTop=term.scrollHeight;
    await sleep(speed);
  }
  return d;
}

async function addPrompt(cmd){
  const d=document.createElement('div');
  d.className='t-line prompt';
  term.appendChild(d);
  const full=cmd;
  for(let i=0;i<=full.length;i++){
    d.textContent=full.slice(0,i);
    await sleep(30);
  }
  term.scrollTop=term.scrollHeight;
}

async function runCommand(cmd, silent=false){
  if(typing) return;
  typing=true;

  // update status
  document.getElementById('sb-cmd').textContent=cmd.toUpperCase();

  // mark active
  document.querySelectorAll('.cmd-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`[data-cmd="${cmd}"]`);
  if(btn) btn.classList.add('active');

  if(!silent) await addPrompt(cmd);

  const fn=COMMANDS[cmd];
  if(fn) await fn();
  else {
    await addLine(`command not found: ${cmd}`,'err');
    await addBlank();
  }

  document.getElementById('sb-cmd').textContent='READY';
  typing=false;
}

/* Sidebar buttons */
document.querySelectorAll('.cmd-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!typing) runCommand(btn.dataset.cmd);
  });
});
